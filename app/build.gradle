buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.9.0'
    }
}

apply plugin: 'com.android.application'

repositories {
    google()
    mavenCentral()
}


dependencies {
    implementation 'commons-codec:commons-codec:1.15'
    implementation 'org.apache.commons:commons-lang3:3.17.0'
}

android {
    namespace 'com.vivokey.rawnfc'
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.vivokey.rawnfc"
        versionCode 3
        versionName "2.0.3"
        minSdkVersion 21
        targetSdkVersion 35
    }
}

